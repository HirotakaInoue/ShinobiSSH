name: ShinobiSSH
options:
  bundleIdPrefix: com.shinobishsh
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  ShinobiSSH:
    type: application
    platform: macOS
    sources:
      - path: ShinobiSSH
        excludes:
          - Package.swift
          - .build
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shinobishsh.ssh-manager
        PRODUCT_NAME: ShinobiSSH
        INFOPLIST_FILE: ShinobiSSH/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShinobiSSH/ShinobiSSH.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
